name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write # create releases + upload assets

jobs:
  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential pkg-config \
            libssl-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev \
            libxdo-dev file patchelf xdg-utils
        env:
          DEBIAN_FRONTEND: noninteractive
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          cache-on-failure: true
      - run: npm ci
      - name: Build deb + AppImage
        run: npx tauri build --bundles deb,appimage
      - name: Stage assets
        run: |
          TAG="${GITHUB_REF_NAME}"
          mkdir -p dist
          cp src-tauri/target/release/bundle/deb/*.deb "dist/Thumbnailer_${TAG}_amd64.deb"
          cp src-tauri/target/release/bundle/appimage/*.AppImage "dist/Thumbnailer_${TAG}_amd64.AppImage"
      - uses: actions/upload-artifact@v4
        with:
          name: linux
          path: dist/*

  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          cache-on-failure: true
      - run: npm ci
      # Native MSVC build — no cargo-xwin, so libwebp's SSE sources compile under
      # cl.exe without the CL feature-flag workaround the cross-build needed.
      - name: Build NSIS installer
        run: npx tauri build --bundles nsis
      - name: Stage asset
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME}"
          mkdir -p dist
          cp src-tauri/target/release/bundle/nsis/*-setup.exe "dist/Thumbnailer_${TAG}_x64-setup.exe"
      - uses: actions/upload-artifact@v4
        with:
          name: windows
          path: dist/*

  release:
    needs: [linux, windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Checksums
        run: cd dist && sha256sum * > SHA256SUMS.txt && cat SHA256SUMS.txt
      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          fail_on_unmatched_files: true
          generate_release_notes: true
          # Hyphenated tags (v0.3.2-beta, v1.0.0-rc1) publish as prereleases
          prerelease: ${{ contains(github.ref_name, '-') }}
