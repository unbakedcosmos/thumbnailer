name: Release

on:
  push:
    tags: ['v*']

jobs:
  build-release:
    runs-on: ci-amd64
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install system dependencies
        run: |
          SUDO=""
          [ "$(id -u)" != "0" ] && command -v sudo >/dev/null && SUDO=sudo
          $SUDO apt-get update
          $SUDO apt-get install -y libwebkit2gtk-4.1-dev build-essential pkg-config \
            libssl-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev \
            libxdo-dev ffmpeg curl file patchelf nsis clang lld llvm
        env:
          DEBIAN_FRONTEND: noninteractive

      - uses: https://github.com/dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - uses: https://github.com/Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      # Prebuilt cargo-xwin (avoids a slow `cargo install` on every release)
      - uses: https://github.com/taiki-e/install-action@v2
        with:
          tool: cargo-xwin

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Linux bundles (deb + AppImage)
        run: npx tauri build --bundles deb,appimage

      # Cross-compiled Windows installer. CL injects the SSE feature flags
      # clang-cl needs for libwebp's per-ISA sources (cl.exe implies them).
      - name: Build Windows installer (NSIS via cargo-xwin)
        run: npx tauri build --runner cargo-xwin --target x86_64-pc-windows-msvc --bundles nsis
        env:
          CL: -msse4.1 -mssse3

      - name: Collect release assets
        run: |
          TAG="${GITHUB_REF_NAME}"
          mkdir -p release-assets
          cp src-tauri/target/release/bundle/deb/*.deb \
             "release-assets/Thumbnailer_${TAG}_amd64.deb"
          cp src-tauri/target/release/bundle/appimage/*.AppImage \
             "release-assets/Thumbnailer_${TAG}_amd64.AppImage"
          cp src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*-setup.exe \
             "release-assets/Thumbnailer_${TAG}_x64-setup.exe"
          cd release-assets && sha256sum * > SHA256SUMS.txt && cat SHA256SUMS.txt

      - name: Publish release
        uses: https://code.forgejo.org/actions/forgejo-release@v2
        with:
          direction: upload
          tag: ${{ github.ref_name }}
          token: ${{ github.token }}
          release-dir: release-assets
          prerelease: false
